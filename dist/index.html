<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ColorSlurp Importer</title>
  <script type="module" crossorigin src="/index.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BjmD6-Gn.css">
</head>
<body>

  <!-- Step 1: JSON input -->
  <div id="step1">
    <h2 id="i18n-title">ColorSlurp → Penpot</h2>
    <p class="sub" id="i18n-sub">Paste or drop your ColorSlurp JSON here</p>
    <textarea id="input" placeholder='{"name":"My Palette","colors":[{"name":"Primary","hex":"#3B82F6"},...]}'></textarea>
    <div class="status info" id="status1"></div>
    <button class="btn-primary" id="btnNext" disabled>Continue →</button>
  </div>

  <!-- Step 2: Swatch selection & import -->
  <div id="step2" style="display:none">
    <div class="step2-header">
      <button class="btn-back" id="btnBack">←</button>
      <div class="palette-name" id="paletteName"></div>
    </div>
    <div class="swatch-grid" id="swatches"></div>
    <label class="prefix-label">
      <input type="checkbox" id="usePrefix" />
      <span id="i18n-prefix">Numbered prefix (e.g. 01_Name)</span>
    </label>
    <div class="status info" id="status2"></div>
    <button class="btn-primary" id="btnImport" disabled>Import</button>
  </div>

</body>
</html>
