<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ColorSlurp Importer</title>
  <script type="module" crossorigin src="./index.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-C7u5GAm3.css">
</head>
<body>

  <!-- Screen 1: Input -->
  <div class="screen" id="screen1">
    <h2 id="appTitle">ColorSlurp → Penpot</h2>
    <p class="sub" id="appSubtitle"></p>
    <textarea id="input"></textarea>
    <div class="status info" id="status1"></div>
    <button class="btn-primary" id="btnAnalyze" disabled></button>
  </div>

  <!-- Screen 2: Results -->
  <div class="screen hidden" id="screen2">
    <button class="back-btn" id="btnBack"></button>

    <div class="palette-title" id="paletteName"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="palette-count" id="paletteCount" style="margin-bottom:0"></div>
      <button class="select-all-btn" id="btnSelectAll"></button>
    </div>

    <div class="swatch-grid" id="swatches"></div>

    <hr class="divider" />

    <div class="import-section">
      <h3 id="colorAssetsTitle"></h3>
      <p id="colorAssetsDesc"></p>
      <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--fg2);margin-bottom:10px;cursor:pointer;">
        <input type="checkbox" id="chkPrefix" style="accent-color:var(--accent);cursor:pointer;">
        <span id="prefixLabel"></span>
      </label>
      <button class="btn-primary" id="btnImportColors"></button>
    </div>

    <div class="import-section" style="opacity:0.4;pointer-events:none;">
      <h3><span id="designTokensTitle"></span> <span style="font-size:10px;font-weight:400;color:var(--fg2);text-transform:none;letter-spacing:0;">— Coming Soon</span></h3>
      <p id="designTokensDesc"></p>
      <button class="btn-secondary" id="btnTokenImport" disabled></button>
    </div>

    <div class="result-status info" id="status2"></div>
  </div>

  <footer>
    <span>© 2026 <a href="https://www.janstieler.de" target="_blank" style="color:inherit;text-decoration:none;">Jan-Frederik Stieler</a></span>
    <div class="footer-right">
      <span class="footer-version" id="appVersion"></span>
      <button id="btnLang">🌐</button>
    </div>
  </footer>

</body>
</html>
